name: Generate neon contribution snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-neon.svg?palette=github-dark&color_snake=#38BDF8&color_dots=#161B22,#007A46,#00B96B,#00E887,#39FF9A

      - name: Make every snake segment uniform and neon
        shell: bash
        run: |
          python <<'PY'
          import re
          from pathlib import Path

          file = Path("dist/github-contribution-grid-snake-neon.svg")
          svg = file.read_text(encoding="utf-8")
          pattern = re.compile(r'<rect\b[^>]*class="s s\d+"[^>]*>')
          rects = pattern.findall(svg)

          if not rects:
              raise RuntimeError("No snake segments found in generated SVG")

          def number_attr(tag, name):
              match = re.search(rf'{name}="([\d.]+)"', tag)
              return float(match.group(1)) if match else None

          sizes = [number_attr(tag, "width") for tag in rects]
          max_size = max(size for size in sizes if size is not None)
          template = next(tag for tag in rects if number_attr(tag, "width") == max_size)

          def read_attr(name, fallback):
              match = re.search(rf'{name}="([^"]+)"', template)
              return match.group(1) if match else fallback

          inset = read_attr("x", "0.6")
          radius = read_attr("rx", "3.5")
          size = f"{max_size:.1f}"

          def make_uniform(match):
              tag = match.group(0)
              values = {
                  "x": inset,
                  "y": inset,
                  "width": size,
                  "height": size,
                  "rx": radius,
                  "ry": radius,
              }
              for name, value in values.items():
                  tag = re.sub(rf'{name}="[^"]+"', f'{name}="{value}"', tag)
              return tag

          svg = pattern.sub(make_uniform, svg)
          svg = svg.replace(
              "fill:var(--cs);",
              "fill:#38BDF8;filter:drop-shadow(0 0 2px #38BDF8) drop-shadow(0 0 5px #0EA5E9);",
          )

          duration_match = re.search(
              r'\.s\{[^}]*animation:none linear ([\d.]+)ms infinite', svg
          )
          head_rect_match = re.search(
              r'<rect\b[^>]*class="s s0"[^>]*/>', svg
          )

          if not duration_match or not head_rect_match:
              raise RuntimeError("Unable to read the generated snake timeline")

          duration_ms = float(duration_match.group(1))
          step_ms = 100.0

          eaten_at = []
          cell_pattern = re.compile(
              r'@keyframes (c[0-9a-z]+)\{(.*?)\}\.c\.\1\{'
          )
          for cell in cell_pattern.finditer(svg):
              eaten = re.search(
                  r'([\d.]+)%,100%\{fill:var\(--ce\)\}',
                  cell.group(2),
              )
              if eaten:
                  eaten_at.append(float(eaten.group(1)))

          eaten_at.sort()
          head_rect = head_rect_match.group(0)
          growth_css = []
          growth_rects = []

          for offset, eaten_percent in enumerate(eaten_at):
              segment_index = 4 + offset
              lag_ms = (segment_index * step_ms) % duration_ms
              phase_delay_ms = -(duration_ms - lag_ms)
              reveal = max(0.01, min(99.98, eaten_percent))
              before_reveal = max(0, reveal - 0.01)
              animation_name = f"grow{offset}"
              class_name = f"g{offset}"

              growth_css.append(
                  f"@keyframes {animation_name}{{"
                  f"0%,{before_reveal:.2f}%{{opacity:0}}"
                  f"{reveal:.2f}%,99.99%{{opacity:1}}"
                  "100%{opacity:0}}"
              )
              growth_css.append(
                  f".s.{class_name}{{"
                  "opacity:0;"
                  f"animation-name:s0,{animation_name};"
                  f"animation-duration:{duration_ms:.0f}ms,{duration_ms:.0f}ms;"
                  "animation-timing-function:linear,steps(1,end);"
                  f"animation-delay:{phase_delay_ms:.1f}ms,0ms;"
                  "animation-iteration-count:infinite,infinite;"
                  "animation-fill-mode:both,both"
                  "}"
              )
              growth_rects.append(
                  head_rect.replace(
                      'class="s s0"',
                      f'class="s {class_name}"',
                  )
              )

          svg = svg.replace(
              "</style>",
              "".join(growth_css) + "</style>",
              1,
          )
          svg = svg.replace(
              head_rect,
              "".join(growth_rects) + head_rect,
              1,
          )

          file.write_text(svg, encoding="utf-8")

          iso_svg = svg
          projection_a = 0.8660254
          projection_b = 0.5
          vertical_scale = projection_b * 2
          tower_heights = {1: 8, 2: 18, 3: 30, 4: 44}

          def pt(x, y):
              return f"{x:.1f},{y:.1f}"

          def cuboid_markup(css_class, x, y, size, screen_height, kind):
              lift = screen_height / vertical_scale
              q1 = (x - lift, y - lift)
              q2 = (x + size - lift, y - lift)
              q3 = (x + size - lift, y + size - lift)
              q4 = (x - lift, y + size - lift)
              p2 = (x + size, y)
              p3 = (x + size, y + size)
              p4 = (x, y + size)
              top = " ".join(pt(*point) for point in (q1, q2, q3, q4))
              side_a = " ".join(pt(*point) for point in (q2, q3, p3, p2))
              side_b = " ".join(pt(*point) for point in (q3, q4, p4, p3))
              return (
                  f'<g class="{css_class} {kind}-cube">'
                  f'<polygon class="{kind}-face {kind}-side-a" points="{side_a}"/>'
                  f'<polygon class="{kind}-face {kind}-side-b" points="{side_b}"/>'
                  f'<polygon class="{kind}-face {kind}-top" points="{top}"/>'
                  '</g>'
              )

          cell_rule_pattern = re.compile(
              r'\.c\.([0-9a-z]+)\{fill:var\(--c([1-4])\);animation-name:[^}]+\}'
          )
          cell_levels = [
              (match.group(1), int(match.group(2)))
              for match in cell_rule_pattern.finditer(iso_svg)
          ]

          for cell_name, level in cell_levels:
              frame_pattern = re.compile(
                  rf'(@keyframes {cell_name}\{{)(.*?)(\}}\.c\.{cell_name}\{{)',
                  re.DOTALL,
              )
              frame_match = frame_pattern.search(iso_svg)
              if frame_match:
                  frame_body = frame_match.group(2)
                  frame_body = frame_body.replace(
                      f"fill:var(--c{level})",
                      f"fill:var(--c{level});opacity:1",
                  )
                  frame_body = frame_body.replace(
                      "fill:var(--ce)",
                      "fill:var(--ce);opacity:0",
                  )
                  iso_svg = (
                      iso_svg[:frame_match.start(2)]
                      + frame_body
                      + iso_svg[frame_match.end(2):]
                  )

              iso_svg = iso_svg.replace(
                  f".c.{cell_name}{{fill:var(--c{level});",
                  f".c.{cell_name}{{fill:var(--c{level});opacity:1;",
                  1,
              )
              rect_pattern = re.compile(
                  rf'<rect class="c {cell_name}" x="([\d.]+)" y="([\d.]+)"[^>]*/>'
              )
              rect_match = rect_pattern.search(iso_svg)
              if rect_match:
                  tower = cuboid_markup(
                      f"c {cell_name}",
                      float(rect_match.group(1)),
                      float(rect_match.group(2)),
                      12,
                      tower_heights[level],
                      "tower",
                  )
                  base_tile = (
                      f'<rect class="c contribution-base" '
                      f'x="{rect_match.group(1)}" y="{rect_match.group(2)}" '
                      'rx="2" ry="2"/>'
                  )
                  iso_svg = (
                      iso_svg[:rect_match.start()]
                      + base_tile
                      + tower
                      + iso_svg[rect_match.end():]
                  )

          snake_pattern = re.compile(
              r'<rect class="s ([^"]+)" x="([\d.]+)" y="([\d.]+)" '
              r'width="([\d.]+)" height="[\d.]+"[^>]*/>'
          )

          def make_snake_cube(match):
              original_size = float(match.group(4))
              size = 12.0
              inset = (original_size - size) / 2
              return cuboid_markup(
                  f"s {match.group(1)}",
                  float(match.group(2)) + inset,
                  float(match.group(3)) + inset,
                  size,
                  size,
                  "snake",
              )

          iso_svg = snake_pattern.sub(make_snake_cube, iso_svg)

          # SVG uses a painter's algorithm: tail must be painted first and head last.
          # Logical lag is s0..s3, then g0..g16 as the snake grows.
          snake_group_pattern = re.compile(
              r'<g class="s ([^"]+) snake-cube">.*?</g>',
              re.DOTALL,
          )
          snake_groups = [
              (match.group(1), match.group(0))
              for match in snake_group_pattern.finditer(iso_svg)
          ]

          def snake_lag(class_name):
              return int(class_name[1:]) if class_name.startswith("s") else 4 + int(class_name[1:])

          snake_groups.sort(key=lambda item: snake_lag(item[0]), reverse=True)
          iso_svg = snake_group_pattern.sub("", iso_svg)
          iso_svg = iso_svg.replace(
              "</svg>",
              "".join(markup for _, markup in snake_groups) + "</svg>",
              1,
          )
          iso_css = (
              ".iso-plane{filter:drop-shadow(0 16px 20px rgba(0,0,0,.82))}"
              ".contribution-base{fill:var(--ce)!important;opacity:1!important;animation:none!important}"
              ".tower-cube{filter:drop-shadow(0 0 2px #00E887) drop-shadow(0 0 7px rgba(57,255,154,.72))}"
              ".tower-face{fill:inherit;stroke:#003820;stroke-width:.8px;"
              "vector-effect:non-scaling-stroke;shape-rendering:geometricPrecision}"
              ".tower-side-a{filter:brightness(.48)}"
              ".tower-side-b{filter:brightness(.68)}"
              ".tower-top{filter:brightness(1.18)}"
              ".snake-face{stroke:#082f49;stroke-width:.8px;"
              "vector-effect:non-scaling-stroke;shape-rendering:geometricPrecision}"
              ".snake-top{fill:#67E8F9}"
              ".snake-side-a{fill:#0EA5E9}"
              ".snake-side-b{fill:#22D3EE}"
              ".iso-plane .s{filter:drop-shadow(0 0 3px #38BDF8) "
              "drop-shadow(0 0 8px #0EA5E9)}"
          )
          iso_svg = iso_svg.replace(
              "</style>",
              iso_css + "</style>",
              1,
          )
          iso_svg = re.sub(
              r'viewBox="[^"]+"',
              'viewBox="0 0 900 540"',
              iso_svg,
              count=1,
          )
          iso_svg = re.sub(r'width="[^"]+"', 'width="900"', iso_svg, count=1)
          iso_svg = re.sub(r'height="[^"]+"', 'height="540"', iso_svg, count=1)

          style_end = iso_svg.index("</style>") + len("</style>")
          svg_end = iso_svg.rfind("</svg>")
          drawing = iso_svg[style_end:svg_end]
          iso_svg = (
              iso_svg[:style_end]
              + '<rect width="900" height="540" fill="#000"/>'
              + '<g class="iso-plane" transform="matrix(.8660254 .5 -.8660254 .5 105 58)">'
              + drawing
              + "</g></svg>"
          )

          tower_count = len(re.findall(r'<g class="c [^"]+ tower-cube">', iso_svg))
          base_tile_count = len(
              re.findall(r'<rect class="c contribution-base"', iso_svg)
          )
          snake_cube_count = iso_svg.count("snake-cube")
          polygon_count = iso_svg.count("<polygon")
          if base_tile_count != tower_count:
              raise RuntimeError(
                  f"3D contribution base mismatch: {base_tile_count}/{tower_count}"
              )
          if tower_count == 0 or tower_count != len(cell_levels):
              raise RuntimeError(
                  f"3D tower generation failed: {tower_count}/{len(cell_levels)} towers"
              )
          if not snake_groups or snake_groups[-1][0] != "s0":
              raise RuntimeError("3D snake depth order is invalid")
          if snake_cube_count != len(snake_groups):
              raise RuntimeError(
                  f"3D snake group mismatch: {snake_cube_count}/{len(snake_groups)}"
              )
          if snake_cube_count < 2 or polygon_count != 3 * (tower_count + snake_cube_count):
              raise RuntimeError(
                  f"3D snake generation failed: {snake_cube_count} cubes, {polygon_count} faces"
              )

          Path("dist/github-contribution-grid-snake-neon-3d.svg").write_text(
              iso_svg,
              encoding="utf-8",
          )

          PY

      - name: Generate self-hosted public activity cards
        shell: bash
        run: |
          python <<'PY'
          import html
          import json
          import urllib.request
          from pathlib import Path

          user = "xlr-aex"
          headers = {
              "Accept": "application/vnd.github+json",
              "User-Agent": "xlr-aex-profile",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def api(url):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          profile = api(f"https://api.github.com/users/{user}")
          repos = api(f"https://api.github.com/users/{user}/repos?type=owner&sort=updated&per_page=100")
          stars = sum(repo.get("stargazers_count", 0) for repo in repos)
          forks = sum(repo.get("forks_count", 0) for repo in repos)
          languages = {}
          for repo in repos:
              for language, count in api(repo["languages_url"]).items():
                  languages[language] = languages.get(language, 0) + count

          colors = ["#38BDF8", "#A78BFA", "#F43F5E", "#22C55E", "#F59E0B"]
          language_rows = sorted(languages.items(), key=lambda item: item[1], reverse=True)[:5]
          total = sum(count for _, count in language_rows) or 1

          def card_shell(body, label):
              return f'''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 210" width="900" height="210" role="img" aria-label="{html.escape(label)}">
          <style>
          .frame{{fill:#000;stroke:#30363d;stroke-width:1}}.cut{{fill:#0d1117;stroke:#30363d}}
          .label{{fill:#8b949e;font:600 12px ui-monospace,SFMono-Regular,Consolas,monospace;letter-spacing:2px}}
          .value{{fill:#f0f6fc;font:700 34px ui-monospace,SFMono-Regular,Consolas,monospace}}
          .small{{fill:#c9d1d9;font:600 14px ui-monospace,SFMono-Regular,Consolas,monospace}}
          .scan{{animation:scan 5s linear infinite}}@keyframes scan{{0%{{transform:translateX(-180px)}}100%{{transform:translateX(980px)}}}}
          .pulse{{animation:pulse 2.6s ease-in-out infinite}}@keyframes pulse{{50%{{opacity:.55}}}}
          </style>
          <path class="frame" d="M12 0H888L900 12V198L888 210H12L0 198V12Z"/>
          <path fill="#161b22" d="M0 36H900V37H0Z"/><path class="scan" fill="#38bdf8" opacity=".18" d="M0 36H180V37H0Z"/>
          <circle class="pulse" cx="22" cy="18" r="4" fill="#39d353"/><text class="label" x="36" y="22">{html.escape(label)}</text>
          {body}</svg>'''

          stat_items = [
              ("PUBLIC REPOS", profile.get("public_repos", len(repos)), "#38BDF8"),
              ("FOLLOWERS", profile.get("followers", 0), "#A78BFA"),
              ("STARS", stars, "#F59E0B"),
              ("FORKS", forks, "#22C55E"),
          ]
          stat_body = []
          for index, (label, value, color) in enumerate(stat_items):
              x = 28 + index * 218
              stat_body.append(f'<path class="cut" d="M{x} 58H{x+190}L{x+202} 70V180L{x+190} 192H{x}Z"/>')
              stat_body.append(f'<path fill="{color}" d="M{x} 58H{x+82}V61H{x}Z"/>')
              stat_body.append(f'<text class="label" x="{x+16}" y="92">{label}</text>')
              stat_body.append(f'<text class="value" x="{x+16}" y="145">{value}</text>')
          stats_svg = card_shell("".join(stat_body), "PUBLIC PROFILE METRICS")

          language_body = ['<text class="label" x="28" y="68">PUBLIC REPOSITORY LANGUAGES</text>']
          cursor = 28.0
          for index, (language, count) in enumerate(language_rows):
              width = 844 * count / total
              language_body.append(f'<rect x="{cursor:.2f}" y="82" width="{width:.2f}" height="18" rx="3" fill="{colors[index]}"/>')
              cursor += width
          for index, (language, count) in enumerate(language_rows):
              x = 28 + (index % 3) * 288
              y = 132 + (index // 3) * 38
              percent = 100 * count / total
              language_body.append(f'<circle cx="{x+6}" cy="{y-5}" r="6" fill="{colors[index]}"/>')
              language_body.append(f'<text class="small" x="{x+20}" y="{y}">{html.escape(language)}  {percent:.1f}%</text>')
          languages_svg = card_shell("".join(language_body), "PUBLIC LANGUAGE DISTRIBUTION")

          Path("dist/public-profile-metrics.svg").write_text(stats_svg, encoding="utf-8")
          Path("dist/public-language-distribution.svg").write_text(languages_svg, encoding="utf-8")
          PY

      - name: Publish the generated SVG
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
