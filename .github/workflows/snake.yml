name: Generate neon contribution snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-neon.svg?palette=github-dark&color_snake=#38BDF8&color_dots=#161B22,#0E4429,#006D32,#26A641,#39D353

      - name: Make every snake segment uniform and neon
        shell: bash
        run: |
          python <<'PY'
          import re
          from pathlib import Path

          file = Path("dist/github-contribution-grid-snake-neon.svg")
          svg = file.read_text(encoding="utf-8")
          pattern = re.compile(r'<rect\b[^>]*class="s s\d+"[^>]*>')
          rects = pattern.findall(svg)

          if not rects:
              raise RuntimeError("No snake segments found in generated SVG")

          def number_attr(tag, name):
              match = re.search(rf'{name}="([\d.]+)"', tag)
              return float(match.group(1)) if match else None

          sizes = [number_attr(tag, "width") for tag in rects]
          max_size = max(size for size in sizes if size is not None)
          template = next(tag for tag in rects if number_attr(tag, "width") == max_size)

          def read_attr(name, fallback):
              match = re.search(rf'{name}="([^"]+)"', template)
              return match.group(1) if match else fallback

          inset = read_attr("x", "0.6")
          radius = read_attr("rx", "3.5")
          size = f"{max_size:.1f}"

          def make_uniform(match):
              tag = match.group(0)
              values = {
                  "x": inset,
                  "y": inset,
                  "width": size,
                  "height": size,
                  "rx": radius,
                  "ry": radius,
              }
              for name, value in values.items():
                  tag = re.sub(rf'{name}="[^"]+"', f'{name}="{value}"', tag)
              return tag

          svg = pattern.sub(make_uniform, svg)
          svg = svg.replace(
              "fill:var(--cs);",
              "fill:#38BDF8;filter:drop-shadow(0 0 2px #38BDF8) drop-shadow(0 0 5px #0EA5E9);",
          )

          duration_match = re.search(
              r'\.s\{[^}]*animation:none linear ([\d.]+)ms infinite', svg
          )
          head_frames_match = re.search(
              r'@keyframes s0\{(.*?)\}\.s\.s0\{', svg
          )
          head_rect_match = re.search(
              r'<rect\b[^>]*class="s s0"[^>]*/>', svg
          )

          if not duration_match or not head_frames_match or not head_rect_match:
              raise RuntimeError("Unable to read the generated snake timeline")

          duration_ms = float(duration_match.group(1))
          head_times = sorted({
              float(value)
              for value in re.findall(r'([\d.]+)%', head_frames_match.group(1))
          })
          short_steps = [
              end - start
              for start, end in zip(head_times, head_times[1:])
              if 0.04 <= end - start <= 0.20
          ]
          step_percent = sorted(short_steps)[len(short_steps) // 2]
          step_ms = duration_ms * step_percent / 100

          eaten_at = []
          cell_pattern = re.compile(
              r'@keyframes (c[0-9a-z]+)\{(.*?)\}\.c\.\1\{'
          )
          for cell in cell_pattern.finditer(svg):
              eaten = re.search(
                  r'([\d.]+)%,100%\{fill:var\(--ce\)\}',
                  cell.group(2),
              )
              if eaten:
                  eaten_at.append(float(eaten.group(1)))

          eaten_at.sort()
          head_rect = head_rect_match.group(0)
          growth_css = []
          growth_rects = []

          for offset, eaten_percent in enumerate(eaten_at):
              segment_index = 4 + offset
              lag_ms = (segment_index * step_ms) % duration_ms
              phase_delay_ms = -(duration_ms - lag_ms)
              reveal = max(0.01, min(99.98, eaten_percent))
              before_reveal = max(0, reveal - 0.01)
              animation_name = f"grow{offset}"
              class_name = f"g{offset}"

              growth_css.append(
                  f"@keyframes {animation_name}{{"
                  f"0%,{before_reveal:.2f}%{{opacity:0}}"
                  f"{reveal:.2f}%,99.99%{{opacity:1}}"
                  "100%{opacity:0}}"
              )
              growth_css.append(
                  f".s.{class_name}{{"
                  "opacity:0;"
                  f"animation-name:s0,{animation_name};"
                  f"animation-duration:{duration_ms:.0f}ms,{duration_ms:.0f}ms;"
                  "animation-timing-function:linear,steps(1,end);"
                  f"animation-delay:{phase_delay_ms:.1f}ms,0ms;"
                  "animation-iteration-count:infinite,infinite;"
                  "animation-fill-mode:both,both"
                  "}"
              )
              growth_rects.append(
                  head_rect.replace(
                      'class="s s0"',
                      f'class="s {class_name}"',
                  )
              )

          svg = svg.replace(
              "</style>",
              "".join(growth_css) + "</style>",
              1,
          )
          svg = svg.replace(
              head_rect,
              "".join(growth_rects) + head_rect,
              1,
          )

          file.write_text(svg, encoding="utf-8")

          iso_svg = svg
          iso_css = (
              ".iso-plane{filter:drop-shadow(0 14px 18px rgba(0,0,0,.78))}"
              ".iso-plane .s{filter:drop-shadow(0 0 3px #38BDF8) "
              "drop-shadow(0 0 8px #0EA5E9) drop-shadow(0 6px 0 #075985)}"
          )

          cell_rule_pattern = re.compile(
              r'\.c\.([0-9a-z]+)\{fill:var\(--c([1-4])\);animation-name:[^}]+\}'
          )
          cell_levels = [
              (match.group(1), int(match.group(2)))
              for match in cell_rule_pattern.finditer(iso_svg)
          ]
          side_colors = {
              1: "#064E3B",
              2: "#065F46",
              3: "#047857",
              4: "#059669",
          }

          for cell_name, level in cell_levels:
              depth = 2 + level * 2
              cell_filter = (
                  f"drop-shadow(0 {depth}px 0 {side_colors[level]}) "
                  f"drop-shadow(0 {depth + 5}px 7px rgba(0,0,0,.72))"
              )
              frame_pattern = re.compile(
                  rf'(@keyframes {cell_name}\{{)(.*?)(\}}\.c\.{cell_name}\{{)',
                  re.DOTALL,
              )
              frame_match = frame_pattern.search(iso_svg)
              if not frame_match:
                  continue

              frame_body = frame_match.group(2)
              frame_body = frame_body.replace(
                  f"fill:var(--c{level})",
                  f"fill:var(--c{level});filter:{cell_filter}",
              )
              frame_body = frame_body.replace(
                  "fill:var(--ce)",
                  "fill:var(--ce);filter:none",
              )
              iso_svg = (
                  iso_svg[:frame_match.start(2)]
                  + frame_body
                  + iso_svg[frame_match.end(2):]
              )
              iso_svg = iso_svg.replace(
                  f".c.{cell_name}{{fill:var(--c{level});",
                  f".c.{cell_name}{{fill:var(--c{level});filter:{cell_filter};",
                  1,
              )

          iso_svg = iso_svg.replace(
              "</style>",
              iso_css + "</style>",
              1,
          )
          iso_svg = re.sub(
              r'viewBox="[^"]+"',
              'viewBox="0 0 900 440"',
              iso_svg,
              count=1,
          )
          iso_svg = re.sub(r'width="[^"]+"', 'width="900"', iso_svg, count=1)
          iso_svg = re.sub(r'height="[^"]+"', 'height="440"', iso_svg, count=1)

          style_end = iso_svg.index("</style>") + len("</style>")
          svg_end = iso_svg.rfind("</svg>")
          drawing = iso_svg[style_end:svg_end]
          iso_svg = (
              iso_svg[:style_end]
              + '<rect width="900" height="440" fill="#000"/>'
              + '<g class="iso-plane" transform="matrix(.78 .32 -.78 .32 110 58)">'
              + drawing
              + "</g></svg>"
          )

          Path("dist/github-contribution-grid-snake-neon-3d.svg").write_text(
              iso_svg,
              encoding="utf-8",
          )

          PY

      - name: Publish the generated SVG
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
